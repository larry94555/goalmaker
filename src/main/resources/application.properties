spring.application.name=goalmaker
server.port=8080

# These llama-server settings intentionally match mini.
llama.manage-server=true
llama.binary=
llama.profile=small
llama.hf-model=
llama.model-path=
llama.alias=qwen2.5-3b-instruct
llama.host=0.0.0.0
llama.port=8081
llama.client-host=127.0.0.1
llama.ctx-size=0
llama.gpu-layers=-1
llama.threads=0
llama.parallel=1
llama.extra-args=
llama.auto-restart=true
llama.health-interval-seconds=15
llama.cache-prompt=true
llama.cache-reuse=256
llama.draft-hf-model=
llama.draft-model-path=
llama.draft-tokens=16
llama.draft-gpu-layers=-1

prompt.max-tokens=1024

# Tool discovery and execution. Skills and MCP servers are loaded once at startup.
skills.dir=skills
mcp.config=mcp.json
tools.timeout-seconds=60
tools.max-iterations=8

# Token-free web research. Local SearXNG is preferred; DuckDuckGo HTML is the fallback.
web.search.searxng-url=http://127.0.0.1:8888/search
web.search.duckduckgo-url=https://html.duckduckgo.com/html/
web.search.max-attempts=2
web.search.retry-delay-millis=250
web.search.max-response-bytes=1048576
web.search.cache-ttl-seconds=300
web.search.cache-max-entries=100

# Public-page fetch limits. Private/local network targets are blocked by default.
web.fetch.max-attempts=2
web.fetch.retry-delay-millis=250
web.fetch.max-response-bytes=2097152
web.fetch.max-redirects=5
web.fetch.default-max-chars=12000
web.fetch.allow-private-addresses=false

# Deterministic multi-source research defaults.
web.research.default-max-sources=3
web.research.default-min-sources=2
web.research.candidate-multiplier=2
web.research.max-concurrency=4
web.research.fetch-max-chars=12000
web.research.timeout-seconds=90

# Query-aware token-free providers. Set a provider URL to blank to disable it.
web.specialized.mediawiki.url=https://en.wikipedia.org/w/api.php
web.specialized.wikidata.url=https://www.wikidata.org/w/api.php
web.specialized.arxiv.url=https://export.arxiv.org/api/query
web.specialized.gdelt.url=https://api.gdeltproject.org/api/v2/doc/doc
web.specialized.commoncrawl.url=https://index.commoncrawl.org/collinfo.json
web.specialized.max-attempts=2
web.specialized.retry-delay-millis=500
web.specialized.max-response-bytes=2097152
web.specialized.max-concurrency=4
web.specialized.timeout-seconds=40
web.specialized.cache-max-entries=200
web.specialized.mediawiki.cache-ttl-seconds=3600
web.specialized.wikidata.cache-ttl-seconds=3600
web.specialized.arxiv.cache-ttl-seconds=1800
web.specialized.gdelt.cache-ttl-seconds=300
web.specialized.commoncrawl.cache-ttl-seconds=3600
web.specialized.mediawiki.min-interval-millis=100
web.specialized.wikidata.min-interval-millis=100
web.specialized.arxiv.min-interval-millis=3000
web.specialized.gdelt.min-interval-millis=1000
web.specialized.commoncrawl.min-interval-millis=500
