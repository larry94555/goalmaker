spring.application.name=goalmaker
server.port=8080

# These llama-server settings intentionally match mini.
llama.manage-server=true
llama.binary=
llama.profile=small
llama.hf-model=
llama.model-path=
llama.alias=qwen2.5-3b-instruct
llama.host=0.0.0.0
llama.port=8081
llama.client-host=127.0.0.1
llama.ctx-size=0
llama.gpu-layers=-1
llama.threads=0
llama.parallel=1
llama.extra-args=
llama.auto-restart=true
llama.health-interval-seconds=15
llama.cache-prompt=true
llama.cache-reuse=256
llama.draft-hf-model=
llama.draft-model-path=
llama.draft-tokens=16
llama.draft-gpu-layers=-1

prompt.max-tokens=1024

# Tool discovery and execution. Skills and MCP servers are loaded once at startup.
skills.dir=skills
mcp.config=mcp.json
tools.timeout-seconds=60
tools.max-iterations=8
# Runtime catalog reload endpoint (POST /admin/tools/reload). Re-scans skills/ and mcp.json so
# tools built during a session activate on the next request. Disable for untrusted environments.
tools.admin-reload-enabled=true

# Token-free web research. Local SearXNG is preferred; DuckDuckGo HTML then DuckDuckGo Lite are the
# fallbacks. Set a fallback URL to blank to disable it.
web.search.searxng-url=http://127.0.0.1:8888/search
web.search.duckduckgo-url=https://html.duckduckgo.com/html/
web.search.duckduckgo-lite-url=https://lite.duckduckgo.com/lite/
web.search.max-attempts=2
web.search.retry-delay-millis=250
web.search.max-response-bytes=1048576
web.search.cache-ttl-seconds=300
web.search.cache-max-entries=100

# SearXNG readiness, recovery, and optional Docker Compose startup.
web.search.searxng-manage=false
web.search.searxng-health-interval-seconds=30
web.search.searxng-health-timeout-millis=2000
web.search.searxng-failure-threshold=2
web.search.searxng-circuit-breaker-seconds=30
web.search.searxng-degraded-latency-millis=1500
web.search.searxng-startup-timeout-seconds=60
web.search.searxng-startup-poll-millis=1000
web.search.searxng-docker-command=docker
web.search.searxng-compose-file=docker-compose.searxng.yml
web.search.searxng-compose-log=searxng-compose.log
web.search.searxng-compose-command-timeout-seconds=30

# Public-page fetch limits. Private/local network targets are blocked by default.
web.fetch.max-attempts=2
web.fetch.retry-delay-millis=250
web.fetch.max-response-bytes=8388608
web.fetch.max-redirects=5
web.fetch.default-max-chars=12000
web.fetch.allow-private-addresses=false
web.fetch.allowed-ports=80,443
web.fetch.total-budget-seconds=40
web.fetch.max-http-requests=12
web.fetch.robots.enabled=true
web.fetch.robots.timeout-seconds=5
web.fetch.robots.max-attempts=1
web.fetch.robots.retry-delay-millis=250
web.fetch.robots.max-response-bytes=524288
web.fetch.robots.max-redirects=5
web.fetch.robots.cache-ttl-seconds=3600
web.fetch.robots.cache-max-entries=200
web.fetch.pdf.max-pages=40
web.fetch.pdf.timeout-seconds=20
web.fetch.worker.enabled=true
web.fetch.worker.mode=process
web.fetch.worker.pool-size=4
web.fetch.worker.memory-mb=192
web.fetch.worker.active-processors=1
web.fetch.worker.timeout-seconds=45
web.fetch.worker.max-output-bytes=1048576
web.fetch.worker.main-class=com.example.goalmaker.FetchWorkerMain
web.fetch.worker.docker.command=docker
web.fetch.worker.docker.image=goalmaker-fetch-worker:local
web.fetch.worker.docker.auto-build=true
web.fetch.worker.docker.dockerfile=docker/fetch-worker/Dockerfile
web.fetch.worker.docker.context=.
web.fetch.worker.docker.build-log=fetch-worker-docker-build.log
web.fetch.worker.docker.build-timeout-seconds=600
web.fetch.worker.docker.memory-mb=384
web.fetch.worker.docker.cpus=1.0
web.fetch.worker.docker.pids-limit=64
web.fetch.worker.docker.tmpfs-mb=32

# Deterministic multi-source research defaults.
web.research.default-max-sources=3
web.research.default-min-sources=2
web.research.candidate-multiplier=2
web.research.max-concurrency=4
web.research.fetch-max-chars=12000
web.research.timeout-seconds=90
web.research.claim-analysis.enabled=true
web.research.claim-analysis.timeout-seconds=60
web.research.claim-analysis.max-tokens=1200
web.research.claim-analysis.max-claims=8
web.research.claim-analysis.max-evidence-chars=600
web.research.claim-analysis.max-output-chars=50000

# Query-aware token-free providers. Set a provider URL to blank to disable it.
web.specialized.mediawiki.url=https://en.wikipedia.org/w/api.php
web.specialized.wikidata.url=https://www.wikidata.org/w/api.php
web.specialized.arxiv.url=https://export.arxiv.org/api/query
web.specialized.gdelt.url=https://api.gdeltproject.org/api/v2/doc/doc
web.specialized.commoncrawl.url=https://index.commoncrawl.org/collinfo.json
web.specialized.max-attempts=2
web.specialized.retry-delay-millis=500
web.specialized.max-response-bytes=2097152
web.specialized.max-concurrency=4
web.specialized.timeout-seconds=40
web.specialized.cache-max-entries=200
web.specialized.mediawiki.cache-ttl-seconds=3600
web.specialized.wikidata.cache-ttl-seconds=3600
web.specialized.arxiv.cache-ttl-seconds=1800
web.specialized.gdelt.cache-ttl-seconds=300
web.specialized.commoncrawl.cache-ttl-seconds=3600
web.specialized.mediawiki.min-interval-millis=100
web.specialized.wikidata.min-interval-millis=100
web.specialized.arxiv.min-interval-millis=3000
web.specialized.gdelt.min-interval-millis=1000
web.specialized.commoncrawl.min-interval-millis=500
