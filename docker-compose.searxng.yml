name: goalmaker-search

services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: goalmaker-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:8888/
    volumes:
      - ./searxng:/etc/searxng:rw
